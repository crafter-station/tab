name: Bug report
description: Report a reproducible problem in Tab.
title: "[Bug]: "
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please use synthetic examples and remove secrets, tokens, prompts, generated text, raw typing logs, and private user data.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed or redacted secrets, tokens, prompts, generated text, raw typing logs, and private user data.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Start Tab with ...
        2. Type in ...
        3. Click ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - Desktop app
        - Floating Suggestion Overlay
        - Web app
        - API Worker
        - Auth or device login
        - Billing or entitlements
        - Personal Memory
        - Shared package
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include only what is relevant.
      placeholder: |
        Commit SHA:
        macOS version:
        Mac model / chip:
        Target app, browser, or route:
        Bun version:
        Cloudflare/Wrangler version:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Paste only redacted logs or attach safe screenshots.
      render: shell
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: Anything else maintainers should know?
    validations:
      required: false
