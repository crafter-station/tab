name: Contributor help
description: Ask for help with setup, tests, architecture, or finding a first issue.
title: "[Help]: "
labels: ["needs-triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      placeholder: Set up the repo, run a test, understand a package, pick an issue, etc.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      placeholder: Commands, docs, issues, or files you already checked.
    validations:
      required: true
  - type: textarea
    id: blocker
    attributes:
      label: Where are you blocked?
      placeholder: Paste redacted output if helpful.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: macOS version, Bun version, command, package, or app surface.
    validations:
      required: false
