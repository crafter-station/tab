name: Release desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Releases can also be published directly from a dev machine via
  # apps/desktop/scripts/build-and-upload.sh, which creates the v* tag and
  # the GitHub Release itself. In that case this workflow still fires on the
  # tag push, so skip the build when the release already exists.
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists (published locally); skipping CI build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Validate release secrets
        shell: bash
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_CONTENT APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required release secret: $name" >&2
              exit 1
            fi
          done

      - name: Prepare notarization key
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag version
        shell: bash
        run: |
          version=$(bun -p 'require("./apps/desktop/package.json").version')
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match desktop version $version" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Check and test
        run: |
          bun run typecheck
          bun run worker:types:check
          bun run lint
          bun run test

      - name: Build signed and notarized app
        run: bun run --cwd apps/desktop dist:mac

      - name: Verify signature, notarization, and architectures
        shell: bash
        run: |
          app="apps/desktop/release/mac-universal/Tab.app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$app"
          lipo -archs "$app/Contents/Resources/app.asar.unpacked/dist/macos-input-tap" | grep -q "x86_64 arm64"

      - name: Prepare release assets
        shell: bash
        run: |
          release="apps/desktop/release"
          cp "$release/Tab-$VERSION-universal.dmg" "$release/Tab.dmg"
          shasum -a 256 \
            "$release/Tab.dmg" \
            "$release/Tab-$VERSION-universal.dmg" \
            "$release/Tab-$VERSION-universal.zip" \
            "$release/Tab-$VERSION-universal.zip.blockmap" \
            "$release/latest-mac.yml" \
            > "$release/SHA256SUMS.txt"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release="apps/desktop/release"
          gh release create "$GITHUB_REF_NAME" \
            "$release/Tab.dmg" \
            "$release/Tab-$VERSION-universal.dmg" \
            "$release/Tab-$VERSION-universal.zip" \
            "$release/Tab-$VERSION-universal.zip.blockmap" \
            "$release/latest-mac.yml" \
            "$release/SHA256SUMS.txt" \
            --title "Tab $VERSION" \
            --generate-notes \
            --draft \
            --verify-tag
          gh release edit "$GITHUB_REF_NAME" --draft=false
