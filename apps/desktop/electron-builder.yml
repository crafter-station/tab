appId: app.tabb.desktop
productName: Tabb
copyright: Copyright © Tabb
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - assets/**/*
asarUnpack:
  - dist/macos-input-tap
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSAccessibilityUsageDescription: Tabb needs accessibility access to paste accepted suggestions into other apps.
    NSInputMonitoringUsageDescription: Tabb needs input monitoring access to observe typing context and the Option+Tab shortcut across apps.
  artifactName: "${productName}-${version}-${arch}.${ext}"
dmg:
  sign: false
afterSign: scripts/notarize.cjs
publish: null
