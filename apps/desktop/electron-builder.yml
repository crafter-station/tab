appId: app.tab.desktop
productName: Tab
copyright: Copyright © Tab
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - assets/**/*
asarUnpack:
  - dist/macos-input-tap
mac:
  category: public.app-category.productivity
  protocols:
    - name: Tab
      schemes:
        - tab
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSAccessibilityUsageDescription: Tab uses Accessibility to read the active text field and insert only Suggestions you accept.
    NSInputMonitoringUsageDescription: Tab uses Input Monitoring to detect typing and the Option+Tab shortcut.
  artifactName: "${productName}-${version}-${arch}.${ext}"
dmg:
  sign: false
afterSign: scripts/notarize.cjs
publish: null
