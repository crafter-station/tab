<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabb Suggestion</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #overlay {
        width: 100%;
        max-width: 520px;
        padding: 8px 14px;
        border-radius: 9px;
        background: rgba(28, 28, 30, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        color: #ffffff;
        font-size: 13px;
        line-height: 1.3;
        text-align: center;
        cursor: pointer;
        user-select: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.08);
        opacity: 1;
        transform: translateY(0) scale(1);
        transition: opacity 520ms ease, transform 520ms ease, background 180ms ease, border-color 180ms ease;
      }

      #suggestion {
        opacity: 0.92;
      }

      #hint {
        display: none;
      }

      #overlay.debug {
        text-align: left;
        padding: 10px 12px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(8, 13, 22, 0.88), rgba(22, 31, 45, 0.78));
        border-color: rgba(90, 200, 250, 0.3);
      }

      #overlay.debug.fading {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }

      #debug-label {
        display: none;
        margin-bottom: 6px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #5ac8fa;
      }

      #debug-meta {
        display: none;
        margin-top: 6px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.48);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #overlay.debug #suggestion {
        display: none;
      }

      #debug-body {
        display: none;
      }

      #overlay.debug #debug-body {
        display: grid;
        gap: 6px;
      }

      .debug-section-label {
        margin-bottom: 4px;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
      }

      #debug-input,
      #debug-api {
        max-height: 112px;
        overflow: hidden;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.88);
      }

      #debug-api {
        max-height: 34px;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(90, 200, 250, 0.08);
        border: 1px solid rgba(90, 200, 250, 0.16);
        color: rgba(255, 255, 255, 0.92);
      }

      #debug-api.muted {
        color: rgba(255, 255, 255, 0.55);
      }

      #overlay.debug #debug-label,
      #overlay.debug #debug-meta {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div id="debug-label">Dev typing context</div>
      <div id="suggestion">Tabb is ready</div>
      <div id="debug-body">
        <div>
          <div class="debug-section-label">Captured input</div>
          <div id="debug-input"></div>
        </div>
        <div>
          <div class="debug-section-label">API response</div>
          <div id="debug-api" class="muted">Waiting for typing...</div>
        </div>
      </div>
      <div id="hint"></div>
      <div id="debug-meta"></div>
    </div>
    <script>
      const suggestionEl = document.getElementById("suggestion");
      const hintEl = document.getElementById("hint");
      const overlayEl = document.getElementById("overlay");
      const debugMetaEl = document.getElementById("debug-meta");
      const debugInputEl = document.getElementById("debug-input");
      const debugApiEl = document.getElementById("debug-api");
      let showingSuggestion = false;
      let latestDebug = null;
      let fadeTimer = null;

      function renderDebug(debug) {
        if (fadeTimer) {
          clearTimeout(fadeTimer);
        }
        overlayEl.classList.add("debug");
        overlayEl.classList.remove("fading");
        debugInputEl.textContent = debug.context || "No captured typing context";
        const api = debug.api || { status: "idle" };
        debugApiEl.classList.toggle("muted", api.status !== "suggestion");
        if (api.status === "loading") {
          debugApiEl.textContent = "Requesting next tokens...";
        } else if (api.status === "empty") {
          debugApiEl.textContent = "No suggestion returned yet.";
        } else if (api.status === "suggestion") {
          debugApiEl.textContent = api.text;
        } else {
          debugApiEl.textContent = "Waiting for debounce...";
        }
        hintEl.style.display = "none";
        debugMetaEl.textContent = `last ${debug.wordCount}/${debug.wordLimit} words · ${debug.source} · ${debug.app || "no active app"}${debug.secureInput ? " · secure input" : ""}${debug.paused ? " · paused" : ""}`;
        fadeTimer = setTimeout(() => {
          if (!showingSuggestion) {
            overlayEl.classList.add("fading");
          }
        }, 2_800);
      }

      if (window.tabb) {
        window.tabb.onSuggestion((suggestion) => {
          showingSuggestion = true;
          if (fadeTimer) {
            clearTimeout(fadeTimer);
          }
          overlayEl.classList.remove("debug", "fading");
          suggestionEl.textContent = suggestion.text;
          hintEl.style.display = "none";
          debugMetaEl.textContent = "";
        });

        window.tabb.onDebugContext((debug) => {
          latestDebug = debug;
          if (!showingSuggestion) {
            renderDebug(debug);
          }
        });

        window.tabb.onHide(() => {
          showingSuggestion = false;
          latestDebug = null;
          overlayEl.classList.remove("debug", "fading");
          suggestionEl.textContent = "";
          hintEl.style.display = "none";
          debugMetaEl.textContent = "";
        });

        overlayEl.addEventListener("click", () => {
          if (showingSuggestion) {
            window.tabb.acceptSuggestion();
          }
        });
      }
    </script>
  </body>
</html>
