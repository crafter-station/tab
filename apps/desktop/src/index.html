<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabb Suggestion</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #overlay {
        width: 100%;
        max-width: 640px;
        padding: 12px 20px;
        border-radius: 10px;
        background: rgba(28, 28, 30, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        color: #ffffff;
        font-size: 15px;
        line-height: 1.35;
        text-align: center;
        cursor: pointer;
        user-select: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      #suggestion {
        opacity: 0.92;
      }

      #hint {
        margin-top: 4px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div id="suggestion">Tabb is ready</div>
      <div id="hint">Option+Tab or click to accept</div>
    </div>
    <script>
      const suggestionEl = document.getElementById("suggestion");
      const hintEl = document.getElementById("hint");
      const overlayEl = document.getElementById("overlay");

      if (window.tabb) {
        window.tabb.onSuggestion((suggestion) => {
          suggestionEl.textContent = suggestion.text;
          hintEl.style.display = "block";
        });

        window.tabb.onHide(() => {
          suggestionEl.textContent = "";
          hintEl.style.display = "none";
        });

        overlayEl.addEventListener("click", () => {
          window.tabb.acceptSuggestion();
        });
      }
    </script>
  </body>
</html>
