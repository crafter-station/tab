<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabb Settings</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f7;
        color: #1c1c1e;
      }

      body {
        padding: 24px;
      }

      #container {
        max-width: 520px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 20px;
        font-size: 20px;
        font-weight: 600;
      }

      .section {
        margin-bottom: 24px;
      }

      .section h2 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #636366;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #e5e5ea;
      }

      .row:last-child {
        border-bottom: none;
      }

      .row span {
        font-size: 14px;
      }

      .status-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-badge.ok {
        background: #e8f5e9;
        color: #1b5e20;
      }

      .status-badge.warning {
        background: #fff3e0;
        color: #e65100;
      }

      .status-badge.error {
        background: #ffebee;
        color: #b71c1c;
      }

      button {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        background: #007aff;
        color: #ffffff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }

      button.secondary {
        background: #e5e5ea;
        color: #1c1c1e;
      }

      button:hover {
        opacity: 0.9;
      }

      .memory-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 12px;
        background: #f5f5f7;
        border-radius: 10px;
        margin-bottom: 8px;
      }

      .memory-item div {
        flex: 1;
        padding-right: 12px;
      }

      .memory-item .content {
        font-size: 14px;
        margin-bottom: 4px;
      }

      .memory-item .category {
        font-size: 12px;
        color: #636366;
      }

      .memory-item button {
        background: #ff3b30;
      }

      #memory-empty {
        font-size: 14px;
        color: #636366;
        padding: 12px 0;
      }

      .paused-banner {
        display: none;
        margin-bottom: 16px;
        padding: 12px;
        background: #fff3e0;
        border-radius: 10px;
        font-size: 14px;
        color: #e65100;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Tabb Settings</h1>

      <div id="paused-banner" class="paused-banner">Tabb is paused. Typing observation and suggestions are disabled.</div>

      <div class="section">
        <h2>Account</h2>
        <div class="row">
          <span id="auth-label">Status</span>
          <span id="auth-status" class="status-badge">Loading…</span>
        </div>
        <div class="row">
          <span id="plan-label">Plan</span>
          <span id="plan-value">—</span>
        </div>
        <div class="row">
          <span id="quota-label">Quota</span>
          <span id="quota-value">—</span>
        </div>
        <div class="row">
          <span id="connectivity-label">Connectivity</span>
          <span id="connectivity-status" class="status-badge ok">Online</span>
        </div>
        <div class="row">
          <button id="sign-in-button" class="secondary">Sign In</button>
          <button id="sign-out-button" class="secondary" style="display: none;">Sign Out</button>
        </div>
      </div>

      <div class="section">
        <h2>Controls</h2>
        <div class="row">
          <span>Pause typing observation</span>
          <button id="pause-button">Pause</button>
        </div>
      </div>

      <div class="section">
        <h2>Quick Memory</h2>
        <div id="memory-list"></div>
      </div>
    </div>

    <script>
      const authStatus = document.getElementById("auth-status");
      const planValue = document.getElementById("plan-value");
      const quotaValue = document.getElementById("quota-value");
      const connectivityStatus = document.getElementById("connectivity-status");
      const signInButton = document.getElementById("sign-in-button");
      const signOutButton = document.getElementById("sign-out-button");
      const pauseButton = document.getElementById("pause-button");
      const pausedBanner = document.getElementById("paused-banner");
      const memoryList = document.getElementById("memory-list");

      function renderStatus(status) {
        authStatus.textContent = status.auth.replace(/_/g, " ");
        authStatus.className = "status-badge " + (status.auth === "signed_in" ? "ok" : status.auth === "revoked_device" ? "error" : "warning");

        if (status.quota) {
          planValue.textContent = status.quota.planId;
          quotaValue.textContent = `${status.quota.usage} / ${status.quota.quota}`;
        } else {
          planValue.textContent = "—";
          quotaValue.textContent = "—";
        }

        connectivityStatus.textContent = status.connectivity;
        connectivityStatus.className = "status-badge " + (status.connectivity === "online" ? "ok" : "warning");

        if (status.auth === "signed_in") {
          signInButton.style.display = "none";
          signOutButton.style.display = "inline-block";
        } else {
          signInButton.style.display = "inline-block";
          signOutButton.style.display = "none";
        }
      }

      function renderMemories(memories) {
        memoryList.innerHTML = "";
        if (memories.length === 0) {
          memoryList.innerHTML = '<div id="memory-empty">No Personal Memory stored yet.</div>';
          return;
        }

        for (const memory of memories) {
          const item = document.createElement("div");
          item.className = "memory-item";
          item.innerHTML = `
            <div>
              <div class="content"></div>
              <div class="category"></div>
            </div>
            <button>Delete</button>
          `;
          item.querySelector(".content").textContent = memory.content;
          item.querySelector(".category").textContent = memory.category;
          item.querySelector("button").addEventListener("click", () => {
            window.tabb?.deleteMemory?.(memory.id);
          });
          memoryList.appendChild(item);
        }
      }

      function renderPaused(paused) {
        pausedBanner.style.display = paused ? "block" : "none";
        pauseButton.textContent = paused ? "Resume" : "Pause";
      }

      async function loadInitialState() {
        if (!window.tabb?.getInitialState) return;
        const state = await window.tabb.getInitialState();
        renderStatus(state.status);
        renderMemories(state.memories);
        renderPaused(state.paused);
      }

      if (window.tabb) {
        window.tabb.onStatusChanged((status) => renderStatus(status));
        window.tabb.onMemoriesChanged((memories) => renderMemories(memories));
        window.tabb.onPauseChanged((paused) => renderPaused(paused));

        signInButton.addEventListener("click", () => window.tabb?.signIn?.());
        signOutButton.addEventListener("click", () => window.tabb?.signOut?.());
        pauseButton.addEventListener("click", () => window.tabb?.togglePause?.());

        loadInitialState();
      }
    </script>
  </body>
</html>
